name: Editor Check Types
on: pull_request
jobs:
  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install
        run: |
          npm ci
      - name: check types
        run: |
          npm run test:types:all
