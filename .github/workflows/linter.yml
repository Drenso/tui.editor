name: Editor Lint Code Base
on: pull_request
jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install
        run: |
          npm ci
      - name: eslint
        run: |
          npm run lint:all
